# monitoring-app.yaml
# Argo CD Application using the "multiple sources" feature: pulls the
# kube-prometheus-stack chart straight from its Helm repo, and layers the
# values file that lives in this gitops repo on top of it. Put this file in
# your gitops repo under argocd/ alongside the other *-app.yaml files, and
# point your root Argo CD "app of apps" (or `kubectl apply -f`) at it once.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: "65.8.1"   # pin to whatever version you test with
      helm:
        valueFiles:
          - $values/monitoring/prometheus-values.yaml
    - repoURL: https://github.com/Filopateer-Shaker/Deploy-Cart.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # kube-prometheus-stack's CRDs (Prometheus, Alertmanager,
      # AlertmanagerConfig, PrometheusAgent, etc.) are large enough that
      # kubectl's client-side apply blows past Kubernetes' 262144-byte
      # limit on the last-applied-configuration annotation. That failure
      # then cascades into "no matches for kind Prometheus" because the
      # CRD never actually got created. ServerSideApply skips that
      # annotation entirely and is the standard fix for this chart.
      - ServerSideApply=true

---
# Grafana dashboards and alert rules are plain Kubernetes manifests
# (ConfigMaps with the grafana_dashboard label / PrometheusRule CRDs), so they
# ship as a second, lightweight Argo CD Application watching the same repo
# in directory mode. If you'd rather fold these into the Helm app above via
# grafana.dashboards / additionalPrometheusRulesMap in values.yaml, that also
# works - this split just keeps the Helm app and the raw manifests independent.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-extras
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Filopateer-Shaker/Deploy-Cart.git
    targetRevision: main
    path: monitoring
    directory:
      # Without this, Argo CD only reads the top level of `monitoring/` and
      # silently ignores alerts/, servicemonitors/, and grafana-dashboards/ -
      # which is where basically everything this app is supposed to deploy
      # actually lives.
      recurse: true
      # prometheus-values.yaml sits in this same folder (it has to, so the
      # `monitoring` app above can reference it via $values), but it's a Helm
      # values file, not a Kubernetes manifest - exclude it so Argo CD
      # doesn't try to render it as one.
      exclude: "prometheus-values.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
