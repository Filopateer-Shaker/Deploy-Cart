# image-updater-app.yaml
# Installs the Argo CD Image Updater controller itself.
#
# backend-app.yaml and frontend-app.yaml already carry
# argocd-image-updater.argoproj.io/* annotations telling it *what* to watch
# and how to write the new tag back - but those annotations do nothing
# without this controller actually running in the cluster to read them.
# Without this Application, new images pushed to ECR are never picked up
# automatically; the tag in argocd/{backend,frontend}-app.yaml stays frozen
# at whatever was last set until someone edits it by hand.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-image-updater
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argocd-image-updater
    targetRevision: "1.2.4"
    helm:
      releaseName: argocd-image-updater
      values: |
        # Assumes Argo CD itself lives in the "argocd" namespace, matching
        # every other Application in this repo (server: https://kubernetes.default.svc,
        # namespace: argocd). Adjust serverAddress if that's not the case.
        config:
          argocd:
            grpcWeb: true
            plaintext: false
            insecure: true
            serverAddress: argocd-server.argocd.svc.cluster.local

        # ECR auth: the image-updater pod needs permission to call
        # ecr:GetAuthorizationToken / ecr:DescribeImages against
        # 797601397904.dkr.ecr.us-east-1.amazonaws.com. Cleanest option on
        # EKS is IRSA - attach an IAM role with that permission to this
        # ServiceAccount via annotation. REPLACE_IMAGE_UPDATER_ROLE_ARN
        # with the real role ARN before this app will actually work; until
        # then the controller runs but every ECR poll fails auth.
        serviceAccount:
          create: true
          annotations:
            eks.amazonaws.com/role-arn: "REPLACE_IMAGE_UPDATER_ROLE_ARN"

        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false

# One more manual step this Application can't do for you: because
# backend-app.yaml/frontend-app.yaml use write-back-method: "argocd" (not
# git), the image-updater needs an Argo CD API token to call back into
# Argo CD and set the new image parameter. That means, one time, outside
# of GitOps:
#   1. Create a restricted Argo CD account for it (argocd-cm:
#      accounts.image-updater: apiKey) with RBAC limited to "update" on
#      Applications (argocd-rbac-cm).
#   2. argocd account generate-token --account image-updater
#   3. kubectl create secret generic argocd-image-updater-secret \
#        -n argocd --from-literal=argocd.token=<token from step 2>
# This token can't be committed to git, so it isn't included here.
